<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">
    Editor Interface Elements
  </text>

  <!-- Main Editor Container -->
  <rect x="50" y="60" width="800" height="500" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="4"/>

  <!-- Top Admin Bar -->
  <rect x="50" y="60" width="800" height="50" fill="#1f2937" />
  <text x="70" y="90" font-family="Arial" font-size="14" fill="white">Portfolio Builder</text>

  <!-- Draft Status Indicator -->
  <rect x="200" y="75" width="60" height="20" fill="#fbbf24" rx="10"/>
  <text x="230" y="88" font-family="Arial" font-size="11" fill="#1f2937" text-anchor="middle">DRAFT</text>

  <!-- Auto-save Status -->
  <text x="280" y="88" font-family="Arial" font-size="11" fill="#9ca3af">Saved 30s ago</text>

  <!-- Top Actions -->
  <rect x="650" y="75" width="80" height="20" fill="transparent" stroke="#6b7280" stroke-width="1" rx="4"/>
  <text x="690" y="88" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Preview</text>

  <rect x="740" y="75" width="80" height="20" fill="#10b981" rx="4"/>
  <text x="780" y="88" font-family="Arial" font-size="11" fill="white" text-anchor="middle">Publish</text>

  <!-- Left Sidebar: Page Navigation -->
  <rect x="50" y="110" width="200" height="450" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="150" y="140" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Pages</text>

  <!-- Page List -->
  <rect x="60" y="150" width="180" height="30" fill="#3b82f6" rx="4"/>
  <text x="70" y="168" font-family="Arial" font-size="11" fill="white">Home</text>

  <rect x="60" y="185" width="180" height="30" fill="white" stroke="#e5e7eb" stroke-width="1" rx="4"/>
  <text x="70" y="203" font-family="Arial" font-size="11" fill="#374151">About</text>

  <rect x="60" y="220" width="180" height="30" fill="white" stroke="#e5e7eb" stroke-width="1" rx="4"/>
  <text x="70" y="238" font-family="Arial" font-size="11" fill="#374151">Gallery</text>

  <!-- Add Page Button -->
  <rect x="60" y="260" width="180" height="30" fill="transparent" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,3" rx="4"/>
  <text x="150" y="278" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">+ Add Page</text>

  <!-- Main Canvas Area -->
  <rect x="250" y="110" width="600" height="450" fill="white" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Canvas Header (Page Title) -->
  <rect x="270" y="130" width="560" height="40" fill="#f9fafb" rx="4"/>
  <text x="290" y="155" font-family="Arial" font-size="14" font-weight="bold">Editing: Home Page</text>

  <!-- WYSIWYG Content Area -->
  <!-- Text Component (being edited) -->
  <rect x="290" y="190" width="520" height="80" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3,3" rx="4"/>
  <text x="300" y="210" font-family="Arial" font-size="11" fill="#6b7280">Text Component (Click to edit)</text>

  <!-- Inline Formatting Toolbar -->
  <rect x="300" y="220" width="200" height="30" fill="white" stroke="#6b7280" stroke-width="1" rx="4" opacity="0.95"/>
  <rect x="305" y="225" width="20" height="20" fill="#374151" rx="2"/>
  <text x="315" y="238" font-family="Arial" font-size="10" fill="white" text-anchor="middle">B</text>
  <rect x="330" y="225" width="20" height="20" fill="#e5e7eb" rx="2"/>
  <text x="340" y="238" font-family="Arial" font-size="10" fill="#374151" text-anchor="middle">I</text>
  <rect x="355" y="225" width="20" height="20" fill="#e5e7eb" rx="2"/>
  <text x="365" y="238" font-family="Arial" font-size="10" fill="#374151" text-anchor="middle">U</text>
  <rect x="380" y="225" width="40" height="20" fill="#e5e7eb" rx="2"/>
  <text x="400" y="238" font-family="Arial" font-size="10" fill="#374151" text-anchor="middle">Link</text>

  <!-- Image Component -->
  <rect x="290" y="290" width="520" height="150" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="4"/>
  <rect x="450" y="340" width="200" height="30" fill="white" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,3" rx="4"/>
  <text x="550" y="358" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">+ Add Image</text>

  <!-- Floating Add Component Button -->
  <circle cx="790" cy="500" r="25" fill="#3b82f6" opacity="0.95"/>
  <text x="790" y="508" font-family="Arial" font-size="24" fill="white" text-anchor="middle">+</text>

  <!-- Component Picker (shown when + clicked) -->
  <rect x="600" y="380" width="180" height="160" fill="white" stroke="#6b7280" stroke-width="2" rx="4" opacity="0.95"/>
  <text x="690" y="400" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Add Component</text>
  <rect x="610" y="410" width="160" height="25" fill="#f9fafb" rx="2"/>
  <text x="690" y="427" font-family="Arial" font-size="11" text-anchor="middle">📝 Text Block</text>
  <rect x="610" y="440" width="160" height="25" fill="#f9fafb" rx="2"/>
  <text x="690" y="457" font-family="Arial" font-size="11" text-anchor="middle">🖼️ Single Image</text>
  <rect x="610" y="470" width="160" height="25" fill="#f9fafb" rx="2"/>
  <text x="690" y="487" font-family="Arial" font-size="11" text-anchor="middle">🎨 Image Gallery</text>
  <rect x="610" y="500" width="160" height="25" fill="#f9fafb" rx="2"/>
  <text x="690" y="517" font-family="Arial" font-size="11" text-anchor="middle">📧 Contact Form</text>

  <!-- Labels with arrows pointing to elements -->
  <g id="labels">
    <!-- Draft Status Label -->
    <line x1="230" y1="95" x2="230" y2="105" stroke="#6b7280" stroke-width="1"/>
    <text x="230" y="118" font-family="Arial" font-size="9" fill="#6b7280" text-anchor="middle">Draft Status</text>

    <!-- Auto-save Label -->
    <line x1="320" y1="90" x2="350" y2="45" stroke="#6b7280" stroke-width="1"/>
    <text x="350" y="40" font-family="Arial" font-size="9" fill="#6b7280" text-anchor="middle">Auto-save Indicator</text>

    <!-- Page Navigation Label -->
    <line x1="150" y1="145" x2="100" y2="170" stroke="#6b7280" stroke-width="1"/>
    <text x="100" y="180" font-family="Arial" font-size="9" fill="#6b7280" text-anchor="middle">Page List</text>

    <!-- WYSIWYG Editor Label -->
    <line x1="550" y1="230" x2="570" y2="200" stroke="#6b7280" stroke-width="1"/>
    <text x="570" y="195" font-family="Arial" font-size="9" fill="#6b7280" text-anchor="middle">WYSIWYG Editing</text>

    <!-- Component Picker Label -->
    <line x1="765" y1="500" x2="730" y2="530" stroke="#6b7280" stroke-width="1"/>
    <text x="700" y="545" font-family="Arial" font-size="9" fill="#6b7280" text-anchor="middle">Add Component Button</text>
  </g>
</svg>