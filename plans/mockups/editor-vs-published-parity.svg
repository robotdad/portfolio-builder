<svg width="900" height="550" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">
    DOM Parity: Editor vs Published Site
  </text>

  <!-- Editor View -->
  <g id="editor-view">
    <text x="225" y="70" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Editor View (Draft)</text>

    <!-- Editor Container -->
    <rect x="50" y="85" width="350" height="400" fill="white" stroke="#6b7280" stroke-width="2" rx="4"/>

    <!-- Admin toolbar overlay -->
    <rect x="50" y="85" width="350" height="35" fill="#1f2937" opacity="0.95"/>
    <text x="65" y="105" font-family="Arial" font-size="11" fill="white">Editing Mode</text>
    <rect x="320" y="92" width="60" height="20" fill="#10b981" rx="4"/>
    <text x="350" y="105" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Publish</text>

    <!-- Page Content (Same React Components) -->
    <!-- Hero Text Component -->
    <text x="70" y="150" font-family="Georgia, serif" font-size="24" font-weight="bold">Welcome to My Portfolio</text>

    <!-- Paragraph Component -->
    <text x="70" y="175" font-family="Georgia, serif" font-size="12" fill="#374151">I'm a costume designer specializing in theatrical</text>
    <text x="70" y="190" font-family="Georgia, serif" font-size="12" fill="#374151">productions. My work spans from classical</text>
    <text x="70" y="205" font-family="Georgia, serif" font-size="12" fill="#374151">Shakespeare to contemporary dance.</text>

    <!-- Gallery Component (Grid Layout) -->
    <rect x="70" y="225" width="100" height="100" fill="#e5e7eb" rx="4"/>
    <rect x="180" y="225" width="100" height="100" fill="#e5e7eb" rx="4"/>
    <rect x="290" y="225" width="100" height="100" fill="#e5e7eb" rx="4"/>

    <!-- Contact Button Component -->
    <rect x="70" y="345" width="120" height="40" fill="#3b82f6" rx="4"/>
    <text x="130" y="369" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Get in Touch</text>

    <!-- Footer Component -->
    <line x1="70" y1="410" x2="380" y2="410" stroke="#e5e7eb" stroke-width="1"/>
    <text x="225" y="430" font-family="Arial" font-size="10" fill="#9ca3af" text-anchor="middle">© 2024 Portfolio. All rights reserved.</text>

    <!-- Editing Indicators (only in editor) -->
    <rect x="65" y="145" width="320" height="70" fill="transparent" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" rx="4"/>
    <circle cx="375" cy="155" r="8" fill="#3b82f6"/>
    <text x="375" y="159" font-family="Arial" font-size="10" fill="white" text-anchor="middle">✎</text>

    <!-- Floating Add Button (only in editor) -->
    <circle cx="360" cy="440" r="20" fill="#3b82f6" opacity="0.9"/>
    <text x="360" y="447" font-family="Arial" font-size="18" fill="white" text-anchor="middle">+</text>
  </g>

  <!-- Published View -->
  <g id="published-view">
    <text x="675" y="70" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Published Site</text>

    <!-- Browser Frame -->
    <rect x="500" y="85" width="350" height="400" fill="white" stroke="#6b7280" stroke-width="2" rx="4"/>

    <!-- Browser Chrome -->
    <rect x="500" y="85" width="350" height="35" fill="#f3f4f6"/>
    <circle cx="515" cy="102" r="4" fill="#ef4444"/>
    <circle cx="528" cy="102" r="4" fill="#fbbf24"/>
    <circle cx="541" cy="102" r="4" fill="#10b981"/>
    <rect x="560" y="95" width="200" height="20" fill="white" stroke="#e5e7eb" stroke-width="1" rx="10"/>
    <text x="570" y="107" font-family="Arial" font-size="10" fill="#6b7280">myportfolio.com</text>

    <!-- EXACT SAME Page Content (Same React Components) -->
    <!-- Hero Text Component -->
    <text x="520" y="150" font-family="Georgia, serif" font-size="24" font-weight="bold">Welcome to My Portfolio</text>

    <!-- Paragraph Component -->
    <text x="520" y="175" font-family="Georgia, serif" font-size="12" fill="#374151">I'm a costume designer specializing in theatrical</text>
    <text x="520" y="190" font-family="Georgia, serif" font-size="12" fill="#374151">productions. My work spans from classical</text>
    <text x="520" y="205" font-family="Georgia, serif" font-size="12" fill="#374151">Shakespeare to contemporary dance.</text>

    <!-- Gallery Component (Grid Layout) - IDENTICAL -->
    <rect x="520" y="225" width="100" height="100" fill="#e5e7eb" rx="4"/>
    <rect x="630" y="225" width="100" height="100" fill="#e5e7eb" rx="4"/>
    <rect x="740" y="225" width="100" height="100" fill="#e5e7eb" rx="4"/>

    <!-- Contact Button Component - IDENTICAL -->
    <rect x="520" y="345" width="120" height="40" fill="#3b82f6" rx="4"/>
    <text x="580" y="369" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Get in Touch</text>

    <!-- Footer Component - IDENTICAL -->
    <line x1="520" y1="410" x2="830" y2="410" stroke="#e5e7eb" stroke-width="1"/>
    <text x="675" y="430" font-family="Arial" font-size="10" fill="#9ca3af" text-anchor="middle">© 2024 Portfolio. All rights reserved.</text>

    <!-- NO editing indicators or floating buttons -->
  </g>

  <!-- Key Concept Arrows and Labels -->
  <!-- Arrow showing same components -->
  <path d="M 410 260 L 490 260" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="450" y="250" font-family="Arial" font-size="11" fill="#10b981" text-anchor="middle">Same React Components</text>

  <!-- Difference callouts -->
  <rect x="100" y="500" width="180" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="4"/>
  <text x="190" y="518" font-family="Arial" font-size="10" fill="#92400e" text-anchor="middle">Editor has: toolbar, edit indicators</text>

  <rect x="620" y="500" width="180" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="710" y="518" font-family="Arial" font-size="10" fill="#065f46" text-anchor="middle">Published: clean, no UI chrome</text>

  <!-- Central concept -->
  <rect x="350" y="505" width="200" height="30" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" rx="4"/>
  <text x="450" y="523" font-family="Arial" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">100% DOM Parity</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>
</svg>