<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">
    Gallery Component Layout Options
  </text>

  <!-- Grid Layout -->
  <g id="grid-layout">
    <text x="150" y="70" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Grid Layout</text>

    <!-- Container -->
    <rect x="50" y="85" width="200" height="200" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="4"/>

    <!-- Grid items -->
    <rect x="60" y="95" width="55" height="55" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="122" y="95" width="55" height="55" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="184" y="95" width="55" height="55" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>

    <rect x="60" y="157" width="55" height="55" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="122" y="157" width="55" height="55" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="184" y="157" width="55" height="55" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>

    <rect x="60" y="219" width="55" height="55" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="122" y="219" width="55" height="55" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="184" y="219" width="55" height="55" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>

    <!-- Properties -->
    <text x="150" y="305" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">• Fixed columns</text>
    <text x="150" y="320" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">• Uniform sizing</text>
    <text x="150" y="335" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">• Responsive gaps</text>
  </g>

  <!-- Carousel Layout -->
  <g id="carousel-layout">
    <text x="450" y="70" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Carousel Layout</text>

    <!-- Container -->
    <rect x="350" y="85" width="200" height="200" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="4"/>

    <!-- Main visible image -->
    <rect x="375" y="110" width="150" height="150" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="4"/>
    <text x="450" y="185" font-family="Arial" font-size="24" fill="#6b7280" text-anchor="middle">1</text>

    <!-- Navigation arrows -->
    <circle cx="360" cy="185" r="15" fill="white" stroke="#6b7280" stroke-width="1" opacity="0.9"/>
    <text x="360" y="190" font-family="Arial" font-size="16" fill="#6b7280" text-anchor="middle">‹</text>

    <circle cx="540" cy="185" r="15" fill="white" stroke="#6b7280" stroke-width="1" opacity="0.9"/>
    <text x="540" y="190" font-family="Arial" font-size="16" fill="#6b7280" text-anchor="middle">›</text>

    <!-- Dots indicator -->
    <circle cx="420" cy="270" r="4" fill="#3b82f6"/>
    <circle cx="435" cy="270" r="3" fill="#d1d5db"/>
    <circle cx="450" cy="270" r="3" fill="#d1d5db"/>
    <circle cx="465" cy="270" r="3" fill="#d1d5db"/>
    <circle cx="480" cy="270" r="3" fill="#d1d5db"/>

    <!-- Properties -->
    <text x="450" y="305" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">• One at a time</text>
    <text x="450" y="320" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">• Swipe/click navigation</text>
    <text x="450" y="335" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">• Optional autoplay</text>
  </g>

  <!-- Masonry Layout -->
  <g id="masonry-layout">
    <text x="750" y="70" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Masonry Layout</text>

    <!-- Container -->
    <rect x="650" y="85" width="200" height="200" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="4"/>

    <!-- Masonry items with varied heights -->
    <rect x="660" y="95" width="55" height="70" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="722" y="95" width="55" height="45" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="784" y="95" width="55" height="85" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>

    <rect x="660" y="172" width="55" height="45" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="722" y="147" width="55" height="90" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="784" y="187" width="55" height="60" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>

    <rect x="660" y="224" width="55" height="50" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="722" y="244" width="55" height="30" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>
    <rect x="784" y="254" width="55" height="20" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="2"/>

    <!-- Properties -->
    <text x="750" y="305" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">• Variable heights</text>
    <text x="750" y="320" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">• Optimal placement</text>
    <text x="750" y="335" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">• Pinterest-style</text>
  </g>

  <!-- Mobile Adaptation Example -->
  <g id="mobile-adaptation">
    <text x="450" y="380" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Mobile Responsive Behavior</text>

    <!-- Desktop (3 columns) -->
    <g>
      <text x="250" y="415" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">Desktop (3 cols)</text>
      <rect x="200" y="425" width="100" height="80" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="2"/>
      <rect x="206" y="431" width="26" height="26" fill="#e5e7eb" rx="1"/>
      <rect x="237" y="431" width="26" height="26" fill="#e5e7eb" rx="1"/>
      <rect x="268" y="431" width="26" height="26" fill="#e5e7eb" rx="1"/>
      <rect x="206" y="462" width="26" height="26" fill="#e5e7eb" rx="1"/>
      <rect x="237" y="462" width="26" height="26" fill="#e5e7eb" rx="1"/>
      <rect x="268" y="462" width="26" height="26" fill="#e5e7eb" rx="1"/>
    </g>

    <!-- Tablet (2 columns) -->
    <g>
      <text x="450" y="415" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">Tablet (2 cols)</text>
      <rect x="400" y="425" width="100" height="80" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="2"/>
      <rect x="410" y="431" width="35" height="35" fill="#e5e7eb" rx="1"/>
      <rect x="455" y="431" width="35" height="35" fill="#e5e7eb" rx="1"/>
      <rect x="410" y="471" width="35" height="35" fill="#e5e7eb" rx="1"/>
      <rect x="455" y="471" width="35" height="35" fill="#e5e7eb" rx="1"/>
    </g>

    <!-- Mobile (1 column) -->
    <g>
      <text x="650" y="415" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">Mobile (1 col)</text>
      <rect x="600" y="425" width="100" height="80" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="2"/>
      <rect x="615" y="431" width="70" height="30" fill="#e5e7eb" rx="1"/>
      <rect x="615" y="466" width="70" height="30" fill="#e5e7eb" rx="1"/>
    </g>
  </g>

  <!-- Theme Compatibility Note -->
  <rect x="300" y="530" width="300" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="4"/>
  <text x="450" y="548" font-family="Arial" font-size="11" fill="#92400e" text-anchor="middle">Note: Some themes may not support all gallery types.</text>
  <text x="450" y="562" font-family="Arial" font-size="11" fill="#92400e" text-anchor="middle">Fallback behavior should be defined.</text>
</svg>