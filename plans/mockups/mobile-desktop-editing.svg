<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">
    Responsive Editing Experience
  </text>

  <!-- Desktop View -->
  <g id="desktop-view">
    <text x="250" y="70" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Desktop Editor</text>

    <!-- Browser frame -->
    <rect x="50" y="85" width="400" height="280" fill="white" stroke="#94a3b8" stroke-width="2" rx="8"/>
    <rect x="50" y="85" width="400" height="30" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2" rx="8"/>
    <circle cx="70" cy="100" r="4" fill="#ef4444"/>
    <circle cx="85" cy="100" r="4" fill="#fbbf24"/>
    <circle cx="100" cy="100" r="4" fill="#10b981"/>

    <!-- Left sidebar -->
    <rect x="60" y="125" width="80" height="230" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
    <text x="100" y="145" font-family="Arial" font-size="11" text-anchor="middle">Pages</text>
    <rect x="70" y="155" width="60" height="20" fill="#3b82f6" rx="4"/>
    <rect x="70" y="180" width="60" height="20" fill="#e5e7eb" rx="4"/>
    <rect x="70" y="205" width="60" height="20" fill="#e5e7eb" rx="4"/>

    <!-- Main editor canvas -->
    <rect x="150" y="125" width="290" height="230" fill="white" stroke="#d1d5db" stroke-width="1"/>

    <!-- Floating toolbar -->
    <rect x="160" y="135" width="140" height="30" fill="white" stroke="#6b7280" stroke-width="1" rx="4" opacity="0.95"/>
    <rect x="165" y="140" width="20" height="20" fill="#374151" rx="2"/>
    <rect x="190" y="140" width="20" height="20" fill="#e5e7eb" rx="2"/>
    <rect x="215" y="140" width="20" height="20" fill="#e5e7eb" rx="2"/>
    <rect x="240" y="140" width="20" height="20" fill="#e5e7eb" rx="2"/>

    <!-- Content -->
    <rect x="160" y="175" width="270" height="15" fill="#3b82f6" opacity="0.2" rx="2"/>
    <rect x="160" y="195" width="200" height="8" fill="#9ca3af" rx="2"/>
    <rect x="160" y="208" width="240" height="8" fill="#9ca3af" rx="2"/>
    <rect x="160" y="221" width="220" height="8" fill="#9ca3af" rx="2"/>

    <!-- Image component -->
    <rect x="160" y="240" width="120" height="80" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3" rx="4"/>
    <text x="220" y="280" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">+ Add Image</text>

    <!-- Floating action button -->
    <circle cx="410" cy="335" r="20" fill="#3b82f6"/>
    <text x="410" y="342" font-family="Arial" font-size="20" fill="white" text-anchor="middle">+</text>
  </g>

  <!-- Mobile View -->
  <g id="mobile-view">
    <text x="650" y="70" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Mobile Editor</text>

    <!-- Phone frame -->
    <rect x="575" y="85" width="150" height="320" fill="white" stroke="#374151" stroke-width="3" rx="12"/>
    <rect x="580" y="90" width="140" height="310" fill="white" stroke="none" rx="8"/>

    <!-- Status bar -->
    <rect x="580" y="90" width="140" height="20" fill="#1f2937" rx="8"/>
    <text x="650" y="103" font-family="Arial" font-size="9" fill="white" text-anchor="middle">9:41 AM</text>

    <!-- Top toolbar -->
    <rect x="580" y="110" width="140" height="35" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
    <text x="595" y="130" font-family="Arial" font-size="14" text-anchor="start">≡</text>
    <text x="650" y="130" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">Edit Page</text>
    <text x="705" y="130" font-family="Arial" font-size="12" text-anchor="end">Save</text>

    <!-- Content area -->
    <rect x="585" y="150" width="130" height="15" fill="#3b82f6" opacity="0.2" rx="2"/>
    <rect x="585" y="170" width="100" height="6" fill="#9ca3af" rx="2"/>
    <rect x="585" y="180" width="120" height="6" fill="#9ca3af" rx="2"/>
    <rect x="585" y="190" width="110" height="6" fill="#9ca3af" rx="2"/>

    <!-- Image component -->
    <rect x="585" y="205" width="130" height="80" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3" rx="4"/>
    <text x="650" y="245" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">📷 Take Photo</text>

    <!-- Keyboard area (when editing) -->
    <rect x="580" y="295" width="140" height="105" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" rx="8"/>
    <text x="650" y="315" font-family="Arial" font-size="9" fill="#6b7280" text-anchor="middle">Keyboard</text>

    <!-- Formatting toolbar above keyboard -->
    <rect x="585" y="300" width="130" height="25" fill="white" stroke="#6b7280" stroke-width="1" rx="4"/>
    <rect x="590" y="305" width="15" height="15" fill="#374151" rx="2"/>
    <rect x="610" y="305" width="15" height="15" fill="#e5e7eb" rx="2"/>
    <rect x="630" y="305" width="15" height="15" fill="#e5e7eb" rx="2"/>
    <rect x="650" y="305" width="15" height="15" fill="#e5e7eb" rx="2"/>

    <!-- Bottom tab bar -->
    <rect x="580" y="370" width="140" height="30" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" rx="8"/>
    <text x="605" y="390" font-family="Arial" font-size="10" text-anchor="middle">Edit</text>
    <text x="650" y="390" font-family="Arial" font-size="10" text-anchor="middle">Pages</text>
    <text x="695" y="390" font-family="Arial" font-size="10" text-anchor="middle">Media</text>

    <!-- Floating action button (smaller on mobile) -->
    <circle cx="695" cy="355" r="15" fill="#3b82f6"/>
    <text x="695" y="361" font-family="Arial" font-size="16" fill="white" text-anchor="middle">+</text>
  </g>

  <!-- Key differences labels -->
  <text x="250" y="390" font-family="Arial" font-size="11" fill="#374151" text-anchor="middle">• Sidebar navigation</text>
  <text x="250" y="405" font-family="Arial" font-size="11" fill="#374151" text-anchor="middle">• Floating toolbar</text>
  <text x="250" y="420" font-family="Arial" font-size="11" fill="#374151" text-anchor="middle">• Drag &amp; drop with mouse</text>
  <text x="250" y="435" font-family="Arial" font-size="11" fill="#374151" text-anchor="middle">• Multiple panels visible</text>

  <text x="650" y="430" font-family="Arial" font-size="11" fill="#374151" text-anchor="middle">• Bottom navigation</text>
  <text x="650" y="445" font-family="Arial" font-size="11" fill="#374151" text-anchor="middle">• Touch gestures</text>
  <text x="650" y="460" font-family="Arial" font-size="11" fill="#374151" text-anchor="middle">• Camera integration</text>
  <text x="650" y="475" font-family="Arial" font-size="11" fill="#374151" text-anchor="middle">• Single column layout</text>

  <!-- Central concept -->
  <rect x="350" y="450" width="200" height="30" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" rx="4"/>
  <text x="450" y="470" font-family="Arial" font-size="11" fill="#1e40af" text-anchor="middle">Same Functionality, Adapted UI</text>
</svg>